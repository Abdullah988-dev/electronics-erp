<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electronics ERP</title>

    <!-- 1. Tailwind Play CDN (Yeh styles ko foran browser mein parse kar dega) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 2. Google Inter Font link for premium ERP feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <!-- 3. Tailwind Configuration Engine script -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              erp: {
                bg: '#f8fafc',
                primary: '#4f46e5',
                sidebar: '#0f172a',
              }
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-slate-900 font-sans antialiased selection:bg-indigo-500 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
